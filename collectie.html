<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collectie – Buurtbieb</title>
  <style>
    :root {
      --accent: #007AFF;
      --green: #34C759;
      --orange: #FF9500;
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #e0e0e5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
      color: white;
      padding: 40px 24px 32px;
      text-align: center;
    }

    header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
    header p  { opacity: 0.85; font-size: 1rem; }

    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .stat {
      background: white;
      border-radius: 12px;
      padding: 14px 20px;
      text-align: center;
      border: 1px solid var(--border);
      min-width: 120px;
    }

    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    .controls {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="search"] {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      background: white;
      outline: none;
    }

    input[type="search"]:focus { border-color: var(--accent); }

    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }

    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }

    .cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: #e8e8ed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .cover img { width: 100%; height: 100%; object-fit: cover; }
    .cover-placeholder { width: 100%; aspect-ratio: 2/3; background: #e8e8ed; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

    .card-body { padding: 10px 12px 12px; }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-author {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .badge-available { background: #d4f5e0; color: #1a7a3d; }
    .badge-checkedout { background: #ffecd4; color: #9a4e00; }

    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: white;
    }

    #last-updated { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Buurtbieb Collectie</h1>
  <p id="last-updated">Laden...</p>
</header>

<div class="stats" id="stats" style="display:none">
  <div class="stat">
    <div class="stat-value" id="stat-total">–</div>
    <div class="stat-label">Totaal</div>
  </div>
  <div class="stat">
    <div class="stat-value" style="color:var(--green)" id="stat-available">–</div>
    <div class="stat-label">Beschikbaar</div>
  </div>
  <div class="stat">
    <div class="stat-value" style="color:var(--orange)" id="stat-checkedout">–</div>
    <div class="stat-label">Uitgeleend</div>
  </div>
</div>

<div class="controls">
  <input type="search" id="search" placeholder="Zoek op titel of auteur..." oninput="render()" />
  <div class="filter-group">
    <button class="chip active" data-filter="all"    onclick="setFilter('all')">Alles</button>
    <button class="chip"        data-filter="available" onclick="setFilter('available')">Beschikbaar</button>
    <button class="chip"        data-filter="checkedout" onclick="setFilter('checkedout')">Uitgeleend</button>
    <button class="chip"        data-filter="book"    onclick="setFilter('book')">Boeken</button>
    <button class="chip"        data-filter="magazine" onclick="setFilter('magazine')">Tijdschriften</button>
  </div>
</div>

<div class="grid" id="grid">
  <div class="loading">⏳ Collectie laden...</div>
</div>

<footer class="footer">
  Buurtbieb · <a href="index.html">Handleiding</a>
</footer>

<script>
  let allItems = [];
  let currentFilter = 'all';

  async function loadInventory() {
    try {
      const res = await fetch('inventory.json?t=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const data = await res.json();

      allItems = data.items || [];

      document.getElementById('stat-total').textContent = data.totalItems ?? allItems.length;
      document.getElementById('stat-available').textContent = data.availableItems ?? '–';
      document.getElementById('stat-checkedout').textContent = data.checkedOutItems ?? '–';
      document.getElementById('stats').style.display = 'flex';

      if (data.lastUpdated) {
        const d = new Date(data.lastUpdated);
        document.getElementById('last-updated').textContent =
          'Bijgewerkt: ' + d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' }) +
          ' om ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      }

      render();
    } catch (e) {
      document.getElementById('grid').innerHTML =
        '<div class="empty"><div class="empty-icon">📭</div><p>Geen collectiedata beschikbaar.<br>De app heeft nog niet gesynchroniseerd.</p></div>';
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    render();
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    let items = allItems;

    if (currentFilter === 'available')  items = items.filter(i => i.status === 'Beschikbaar');
    if (currentFilter === 'checkedout') items = items.filter(i => i.status === 'Uitgeleend');
    if (currentFilter === 'book')       items = items.filter(i => i.type === 'Boek');
    if (currentFilter === 'magazine')   items = items.filter(i => i.type === 'Tijdschrift');

    if (q) items = items.filter(i =>
      i.title.toLowerCase().includes(q) || i.author.toLowerCase().includes(q)
    );

    const grid = document.getElementById('grid');

    if (items.length === 0) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Geen items gevonden.</p></div>';
      return;
    }

    grid.innerHTML = items.map(item => {
      const available = item.status === 'Beschikbaar';
      const badge = available
        ? '<span class="badge badge-available">✓ Beschikbaar</span>'
        : '<span class="badge badge-checkedout">↑ Uitgeleend</span>';

      const cover = item.coverImageURL
        ? `<div class="cover"><img src="${item.coverImageURL}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentElement.innerHTML='📚'"></div>`
        : `<div class="cover-placeholder">📚</div>`;

      return `
        <div class="card">
          ${cover}
          <div class="card-body">
            <div class="card-title">${esc(item.title)}</div>
            <div class="card-author">${esc(item.author || '–')}</div>
            ${badge}
          </div>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadInventory();
  // Ververs elke 5 minuten automatisch
  setInterval(loadInventory, 5 * 60 * 1000);
</script>
</body>
</html>
